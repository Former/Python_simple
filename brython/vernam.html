<h2>–®–Є—Д—А –Т–µ—А–љ–∞–Љ–∞</h2>

<details> <summary>–Э–∞—Б—В—А–Њ–є–Ї–Є</summary>
<div><label>–°–Є–Љ–≤–Њ–ї—Л (–≤—Б–µ–≥–Њ –Є—Е –і–Њ–ї–ґ–љ–Њ –±—Л—В—М –Ї—А–∞—В–љ–Њ —Б—В–µ–њ–µ–љ–Є 2)</label></div>
<div><textarea id="all_str" onkeyup="onchange_all_str();" cols=80 rows=5></textarea></div>
<details> <summary>–Я–µ—А–µ–Ї–Њ–і–Є—А–Њ–≤–Њ—З–љ–∞—П —В–∞–±–ї–Є—Ж–∞</summary>
<div id="char_table"></div>
</details>
</details>

<div><label>–Ш—Б—Е–Њ–і–љ—Л–є —В–µ–Ї—Б—В</label></div>
<div><textarea id="src_str" cols=80 rows=10></textarea></div>
<div><label>–Ъ–ї—О—З</label></div>
<div><textarea id="key_str" cols=80 rows=10></textarea></div>
<div><label>–®–Є—Д—А–Њ–≤–∞–љ–љ—Л–є —В–µ–Ї—Б—В</label></div>
<div><textarea id="enc_str" cols=80 rows=10></textarea></div>

<div>
<div id="warning"></div>
<div><button id="encode">–Ч–∞—И–Є—Д—А–Њ–≤–∞—В—М</button></div>
</div>

<script type="text/python">

from browser import document, html, window

import random

eng_char = "qwertyuiopasdfghjlzxcvbnmQWERTYUIOPASDFGHJKLZXCVBNM"
eng_char1 = "qwertyuiopasdfghjlzxc"
dig_char = " `1234567890-=\\~!@#$%^&*()_+|[];'/{}:\"<>?.,"
rus_char = "–є—Ж—Г–Ї–µ–љ–≥—И—Й–Ј—Е—К—Д—Л–≤–∞–њ—А–Њ–ї–і–ґ—Н—П—З—Б–Љ–Є—В—М–±—О–Щ–¶–£–Ъ–Х–Э–У–®–©–Ч–•–™–§–Ђ–Т–Р–Я–†–Ю–Ы–Ф–Ц–≠–ѓ–І–°–Ь–Ш–Ґ–ђ–С–Ѓ"
all_str = document["all_str"].value
if all_str == "":
    all_str = dig_char + rus_char  + eng_char1
    document["all_str"].value = all_str

def filter(dust_str, str_symbols):
    r = ""
    for c in dust_str:
        if c in str_symbols:
            r += c
    return r

def ord_char(c1):
    global all_str
    r = all_str.find(c1)
    if r == -1:
        return 0
    return r

def xor_char(c1, c2):
    global all_str
    return all_str[(ord_char(c1) ^ ord_char(c2)) % len(all_str)]

def gen_key(size):
    key = ""
    for i in range(size):
        key += random.choice(all_str)
    return key

def enc(src_str, key):
    e = ""
    for i in range(len(src_str)):
        e += xor_char(key[i % len(key)], src_str[i])
    return e


def Encode(event):
    global all_str
    src_str = document["src_str"].value
    src_str = filter(src_str, all_str)
    document["src_str"].value = src_str

    key_str = document["key_str"].value
    key_str = filter(key_str, all_str)
    if key_str == "":
        key_str = gen_key(len(src_str))
        document["key_str"].value = key_str
    document["enc_str"].value = enc(src_str, key_str)

def onchange_all_str():
    global all_str
    all_str = document["all_str"].value
    document["char_table"].innerHTML = make_char_table(all_str)

    document["warning"].innerHTML = ""
    if not len(all_str) in [2,4,8,16,32,64,128,256,512,1024,2048]:
        document["warning"].innerHTML = "<p style='color:red;'>–Т–Є–Љ–∞–љ–Є–µ!! –І–Є—Б–ї–Њ —Б–Є–Љ–≤–Њ–ї–Њ–≤ –љ–µ –Ї—А–∞—В–љ–Њ 2!!<p>"
window.onchange_all_str = onchange_all_str

def make_char_table(all_str):
    l = len(all_str)
    r = "<p> –Т—Б–µ–≥–Њ —Б–Є–Љ–≤–Њ–ї–Њ–≤ " + str(l) + "</p>"
    r += "<table border=1>"
    for y in range(l + 1):
        c1 = ""
        if y != 0:
            c1 = all_str[y - 1]
        r += "<tr>"
        for x in range(l + 1):
            c2 = ""
            if x != 0:
                c2 = all_str[x - 1]
            color = ""
            td = "td"
            xor = ""
            if len(c1 + c2) < 2:
                td = "th"
                color = " bgcolor=#C0C0C0 "
                xor = c1 + c2
            else:
                xor = xor_char(c1, c2)
            r += "<"+td+color+" width=20px>" + xor + "</"+td+">"
        r += "</tr>"
    r += "</table>"
    return r
onchange_all_str()

document["encode"].bind("click", Encode)

</script>
