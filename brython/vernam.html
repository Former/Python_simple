<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Шифр Вернама</title>
<!-- internet -- >
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/brython@3.12/brython.min.js"></script>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/brython@3.12/brython_stdlib.js"></script>
< !--        -->

<!-- local -->
<script type="text/javascript" src="brython.min_3.12.js"></script>
<script type="text/javascript" src="brython_stdlib_3.12.js"></script>
<!--       -->

</head>
<body>

<h2>Шифр Вернама</h2>

<details> <summary>Настройки</summary>
<div><label>Символы (всего их должно быть кратно степени 2)</label></div>
<div><textarea id="all_str" onkeyup="onchange_all_str();" cols=80 rows=5></textarea></div>
<details> <summary>Перекодировочная таблица</summary>
<div id="char_table"></div>
</details>
</details>

<div>
<label><b>Исходный текст</b></label>
<label>Длина сообщения</label>
<input id = "message_len" type="number" value="0" step="1" />
</div>
<div><textarea id="src_str" onkeyup="onchange_src_str();" cols=80 rows=5></textarea></div>
<div id="src_str_info"></div>
<div>
<label><b>Ключ</b></label>
<label>Номер ключа </label>
<input id = "key_num" type="number" value="0" step="1" />
</div>
<div><textarea id="key_str" cols=80 rows=5></textarea></div>

<label><b>Шифрованный текст</b></label>
<div><textarea id="enc_str" cols=80 rows=5></textarea></div>

<div>
<div id="warning"></div>
<div><button id="encode">Зашифровать</button></div>
</div>

<script type="text/python">

from browser import document, html, window

import random

eng_char = "qwertyuiopasdfghjlzxcvbnmQWERTYUIOPASDFGHJKLZXCVBNM"
eng_char1 = "qwertyuiopasdfghjlzxc"
dig_char = " `1234567890-=\\~!@#$%^&*()_+|[];'/{}:\"<>?.,"
rus_char = "йцукенгшщзхъфывапролджэячсмитьбюЙЦУКЕНГШЩЗХЪФЫВАПРОЛДЖЭЯЧСМИТЬБЮ"
all_str = document["all_str"].value
if all_str == "":
    all_str = dig_char + rus_char  + eng_char1
    document["all_str"].value = all_str

def get_message_len():
    return int(document["message_len"].value)

def get_key_num():
    return int(document["key_num"].value)

def filter(dust_str, str_symbols):
    r = ""
    for c in dust_str:
        if c in str_symbols:
            r += c
    return r

def ord_char(c1):
    global all_str
    r = all_str.find(c1)
    if r == -1:
        return 0
    return r

def xor_char(c1, c2):
    global all_str
    return all_str[(ord_char(c1) ^ ord_char(c2)) % len(all_str)]

def gen_key(size):
    key = ""
    for i in range(size):
        key += random.choice(all_str)
    return key

def enc(src_str, key):
    e = ""
    for i in range(len(src_str)):
        e += xor_char(key[i % len(key)], src_str[i])
    return e


def Encode(event):

    global all_str
    src_str = document["src_str"].value
    src_str = filter(src_str, all_str)

    l = len(src_str)
    ml = get_message_len()
    if ml > 0:
        l = ml

    ls = len(src_str)
    if ls < l:
        src_str += gen_key(l - ls)
    document["src_str"].value = src_str

    key_str = document["key_str"].value
    key_str = filter(key_str, all_str)
    kn = get_key_num()

    if key_str == "":
        key_str = gen_key(l * (kn + 1))
        document["key_str"].value = key_str
    k = key_str[kn * l:(kn + 1) * l]
    r = ""
    document["warning"].innerHTML = ""
    if k == "":
        document["warning"].innerHTML = "<p style='color:red;'>Вимание!! Номер ключа больше возможного<p>"
    else:
        r = enc(src_str, k)
    document["enc_str"].value = r

def onchange_all_str():
    global all_str
    all_str = document["all_str"].value
    document["char_table"].innerHTML = make_char_table(all_str)

    document["warning"].innerHTML = ""
    if not len(all_str) in [2,4,8,16,32,64,128,256,512,1024,2048]:
        document["warning"].innerHTML = "<p style='color:red;'>Вимание!! Число символов не кратно 2!!<p>"
window.onchange_all_str = onchange_all_str

def onchange_src_str():
    src_str = document["src_str"].value
    l = len(src_str)
    r = "<p>"
    r += "Длина текущего сообщения " + str(l) + " символов."
    ml = get_message_len()
    if ml != 0 and l > ml:
        r += " Cообщение больше максимальной длинны."
    r += "</p>"
    document["src_str_info"].innerHTML = r
window.onchange_src_str = onchange_src_str

def make_char_table(all_str):
    l = len(all_str)
    r = "<p> Всего символов " + str(l) + "</p>"
    r += "<table border=1>"
    for y in range(l + 1):
        c1 = ""
        if y != 0:
            c1 = all_str[y - 1]
        r += "<tr>"
        for x in range(l + 1):
            c2 = ""
            if x != 0:
                c2 = all_str[x - 1]
            color = ""
            td = "td"
            xor = ""
            if len(c1 + c2) < 2:
                td = "th"
                color = " bgcolor=#C0C0C0 "
                xor = c1 + c2
            else:
                xor = xor_char(c1, c2)
            r += "<"+td+color+" width=20px>" + xor + "</"+td+">"
        r += "</tr>"
    r += "</table>"
    return r
onchange_all_str()

document["encode"].bind("click", Encode)

</script>

</body>

</html>
