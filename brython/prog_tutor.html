def RunLang(code_pref, execute, input_data, input_code):
    code_pref = code_pref.replace("@input_data", input_data)
    cmd = code_pref + input_code
    exec(execute)

def RunLangHTML(tn, code_pref, execute):
    global g_tasks
    input_data = document[InputDataId(tn)].value
    input_code = editors.get(tn).getValue(); 
    window.localStorage.setItem(StorageCodeId(tn), input_code);
    document[OutputDataId(tn)].value = ""
    document[OutErrorId(tn)].innerHTML = ""
    try:
        RunLang(code_pref, execute, input_data, input_code)
    except Exception as e:
        document[OutErrorId(tn)].innerHTML = "Ошибка в исполнении кода: " + str(e)
        document[OutputDataId(tn)].value = ""
        return
    document[OutputDataId(tn)].value = GetPrint();
    document[HtmlOutId(tn)].innerHTML = GetPrint();
    task = g_tasks.get(tn)
    if len(task) > 3:
        check_array = task[3]
        error = CheckTaskCode(check_array, input_code)
        if error != '':
            document[OutErrorId(tn)].innerHTML += "Ошибка в проверке кода: " + str(error)

def RunButtonPython(event, tn):
    code_pref = '''
global input_data
input_data = \'\'\'@input_data\'\'\'

global input_count
input_count = 0
def input():
    global input_count
    global input_data
    lines = input_data.split('\\n')
    out = lines[input_count]
    input_count += 1
    return out

SetPrint("")
def print(a):
    SetPrint(GetPrint() + str(a) + "\\n")

'''
    RunLangHTML(tn, code_pref, "exec(cmd)");

def RunButtonLua(event, tn):
    code_pref = '''
input_data = [[@input_data]]

input_count = 1
function input()
    local lines = {};
    for line in string.gmatch(input_data .. "\\n", "(.-)\\n") do
        table.insert(lines, line);
    end
    out = lines[input_count]
    input_count = input_count + 1
    return out
end

js.global:SetPrint("")
function print(a)
    js.global:SetPrint(js.global:GetPrint() .. a .. "\\n")
end

'''
    RunLangHTML(tn, code_pref, "window.ExecuteLua(cmd)");

def RunButtonJS(event, tn):
    code_pref = '''
var input_data = `@input_data`

var input_count = 0;
function input() {
    let lines = input_data.split(/\\r\\n|\\r|\\n/);
    let out = lines[input_count];
    input_count = input_count + 1;
    return out;
}

SetPrint("");
function print(a) {
    SetPrint(GetPrint() + a + "\\n");
}

'''
    RunLangHTML(tn, code_pref, "window.ExecuteJS(cmd)");

                def _RunButton(event):
                    return RunButton(event, tn)
                return _RunButton

            binds += [[RunButtonId(tn), MakeRunButton(tn)]]

            result += "<div>"
            result += "<table border = 0>"
            result += "<tr> <td>Номер теста</td> <td>Входные данные</td> <td>Верное значение на выходе</td> <td>Текущее значение на выходе</td> <td>Запуск</td> </tr>"

            test_num = 0
            for test in task_tests:
                result += "<tr>"
                test_input = test[0]
                test_good_output = test[1]
                result += "</tr>"
                result += "<td> <b>" + str(test_num + 1) + ".</b></td>"
                result += "<td><textarea readonly>" + test_input + "</textarea></td>"
                in_id = InputTestId(tn, test_num)
                result += "<td><textarea id='" + in_id + "' readonly>" + test_good_output + "</textarea></td>"
                out_id = OutTestId(tn, test_num) 
                result += "<td id='" + out_id + "'></td>"
                run_id = RunTestId(tn, test_num)
                result += "<td>" + "<button id='" + run_id + "'>Запустить тест</button>" + "</td>"
                def MakeRunTestButton(tn, test_num, out_id, test):
                    def _RunTestButton(event):
                        return RunTestButton(event, tn, test_num, test)
                    return _RunTestButton
                #print(out_id, run_id, tn, test_num, test)
                binds += [[run_id, MakeRunTestButton(tn, test_num, out_id, test)]]

                test_num += 1
            result += "</table>"
            result += "</div>"

            def MakeAllRunButton(tn, task_tests):
                def _AllRunButton(event):
                    return AllRunButton(event, tn, task_tests)
                return _AllRunButton
            binds += [[AllRunButtonId(tn), MakeAllRunButton(tn, task_tests)]]

            result += "<div>"
            result += "<button id='" + AllRunButtonId(tn) + "'>Запустить на всех тестах</button>"
            result += "</div>"
            result += "</td> </tr> </table> "

            result += "</details>"
            task_num += 1
        result += "</details>"
    return result
